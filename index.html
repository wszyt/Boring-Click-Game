<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>种树点击模拟器</title>
  <style>
    :root {
      --surface: rgba(255, 255, 255, 0.88);
      --surface-strong: rgba(255, 255, 255, 0.96);
      --ink: #172033;
      --muted: #667085;
      --line: rgba(23, 32, 51, 0.12);
      --accent: #2f8f5b;
      --accent-2: #8ccf6f;
      --accent-3: #f2c85b;
      --shadow: 0 24px 70px rgba(23, 32, 51, 0.18);
      --glow: rgba(47, 143, 91, 0.32);
      --sky-top: #8fd3ff;
      --sky-mid: #d9f4ff;
      --ground-top: #86c96f;
      --ground-deep: #346344;
      color-scheme: light;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
    }

    body {
      overflow: hidden;
      color: var(--ink);
      background: #d9f4ff;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
    }

    button,
    select {
      font: inherit;
    }

    button {
      border: 0;
    }

    .game-shell {
      position: relative;
      width: 100vw;
      height: 100dvh;
      min-height: 620px;
      overflow: hidden;
      cursor: pointer;
      background:
        radial-gradient(circle at 78% 16%, rgba(255, 246, 179, 0.95) 0 48px, rgba(255, 246, 179, 0.36) 49px 116px, transparent 117px),
        linear-gradient(180deg, var(--sky-top) 0%, var(--sky-mid) 54%, var(--ground-top) 54.3%, var(--ground-deep) 100%);
    }

    .game-shell::before,
    .game-shell::after {
      content: "";
      position: absolute;
      inset: auto -8vw 0;
      pointer-events: none;
    }

    .game-shell::before {
      height: 44%;
      background:
        radial-gradient(ellipse at 12% 8%, rgba(255, 255, 255, 0.68) 0 18%, transparent 19%),
        radial-gradient(ellipse at 34% 18%, rgba(255, 255, 255, 0.5) 0 14%, transparent 15%),
        radial-gradient(ellipse at 84% 0%, rgba(255, 255, 255, 0.54) 0 18%, transparent 19%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.22), transparent 40%);
      top: 0;
      bottom: auto;
      z-index: 1;
    }

    .game-shell::after {
      height: 38%;
      background:
        radial-gradient(ellipse at 18% 10%, rgba(44, 122, 72, 0.64) 0 23%, transparent 24%),
        radial-gradient(ellipse at 70% 4%, rgba(44, 122, 72, 0.52) 0 26%, transparent 27%),
        radial-gradient(ellipse at 45% 94%, rgba(35, 68, 50, 0.58) 0 42%, transparent 43%),
        linear-gradient(180deg, rgba(88, 137, 82, 0.1), rgba(30, 62, 46, 0.72));
      z-index: 2;
    }

    .cloud {
      position: absolute;
      z-index: 3;
      width: var(--cloud-size);
      height: calc(var(--cloud-size) * 0.36);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.78);
      filter: blur(0.2px);
      opacity: var(--cloud-opacity);
      transform: translateX(-20vw);
      animation: cloudDrift var(--cloud-speed) linear infinite;
      top: var(--cloud-top);
    }

    .cloud::before,
    .cloud::after {
      content: "";
      position: absolute;
      bottom: 18%;
      border-radius: 50%;
      background: inherit;
    }

    .cloud::before {
      left: 16%;
      width: 38%;
      height: 115%;
    }

    .cloud::after {
      right: 14%;
      width: 34%;
      height: 95%;
    }

    @keyframes cloudDrift {
      from { transform: translateX(-24vw); }
      to { transform: translateX(116vw); }
    }

    .top-bar {
      position: absolute;
      top: 20px;
      left: 24px;
      right: 24px;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      pointer-events: none;
    }

    .brand {
      min-width: 0;
      pointer-events: auto;
    }

    .brand-title {
      margin: 0;
      font-size: clamp(1.45rem, 2.8vw, 2.8rem);
      line-height: 1.05;
      letter-spacing: 0;
      color: #132238;
      text-shadow: 0 2px 0 rgba(255, 255, 255, 0.45);
    }

    .brand-subtitle {
      margin: 8px 0 0;
      color: rgba(23, 32, 51, 0.72);
      font-size: 0.95rem;
      font-weight: 650;
    }

    .lang-switch {
      display: inline-grid;
      grid-template-columns: repeat(2, minmax(56px, 1fr));
      gap: 4px;
      padding: 5px;
      border: 1px solid rgba(255, 255, 255, 0.68);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.58);
      box-shadow: 0 12px 34px rgba(23, 32, 51, 0.14);
      backdrop-filter: blur(18px);
      pointer-events: auto;
    }

    .lang-button,
    .path-button {
      min-height: 44px;
      cursor: pointer;
      color: var(--ink);
      transition: transform 180ms ease, background 180ms ease, color 180ms ease, box-shadow 180ms ease;
    }

    .lang-button {
      border-radius: 999px;
      background: transparent;
      padding: 0 14px;
      font-weight: 800;
    }

    .lang-button[aria-pressed="true"] {
      color: white;
      background: #172033;
      box-shadow: 0 8px 18px rgba(23, 32, 51, 0.22);
    }

    .stage {
      position: absolute;
      inset: 0;
      z-index: 10;
      display: grid;
      place-items: center;
      padding: 108px min(5vw, 64px) 274px;
      pointer-events: none;
    }

    .model-wrap {
      position: relative;
      display: grid;
      place-items: end center;
      width: min(68vw, 720px);
      height: min(56dvh, 560px);
      min-height: 310px;
      pointer-events: auto;
    }

    .model-wrap::before {
      content: "";
      position: absolute;
      bottom: 7%;
      width: min(68%, 480px);
      height: 16%;
      border-radius: 50%;
      background: radial-gradient(ellipse, var(--glow) 0%, rgba(255, 255, 255, 0) 72%);
      filter: blur(10px);
      animation: glowPulse 3.4s ease-in-out infinite alternate;
    }

    .model-wrap::after {
      content: "";
      position: absolute;
      bottom: 7.5%;
      width: min(42%, 310px);
      height: 8%;
      border-radius: 50%;
      background: rgba(18, 35, 24, 0.28);
      filter: blur(8px);
    }

    #model-container {
      display: grid;
      place-items: end center;
      width: min(100%, 520px);
    }

    .model-svg {
      position: relative;
      z-index: 2;
      display: block;
      width: min(var(--model-width, 420px), 100%);
      max-height: 100%;
      height: auto;
      overflow: visible;
      transform-origin: bottom center;
      filter: drop-shadow(0 24px 28px rgba(23, 32, 51, 0.28));
      animation: modelEnter 520ms cubic-bezier(0.2, 1.2, 0.28, 1), idleFloat 4.2s ease-in-out 560ms infinite;
    }

    .stage-badge {
      position: absolute;
      right: 0;
      bottom: 15%;
      z-index: 4;
      min-width: 132px;
      padding: 12px 14px;
      border: 1px solid rgba(255, 255, 255, 0.74);
      border-radius: 8px;
      color: white;
      background: linear-gradient(135deg, color-mix(in srgb, var(--accent) 88%, #111827), var(--accent));
      box-shadow: 0 16px 40px rgba(23, 32, 51, 0.2);
      text-align: left;
    }

    .stage-badge span {
      display: block;
      color: rgba(255, 255, 255, 0.78);
      font-size: 0.72rem;
      font-weight: 800;
      text-transform: uppercase;
    }

    .stage-badge strong {
      display: block;
      margin-top: 2px;
      font-size: 1rem;
      line-height: 1.25;
    }

    @keyframes glowPulse {
      from { transform: scale(0.92); opacity: 0.64; }
      to { transform: scale(1.08); opacity: 1; }
    }

    @keyframes modelEnter {
      0% { transform: translateY(22px) scale(0.82); opacity: 0; }
      64% { transform: translateY(-5px) scale(1.04); opacity: 1; }
      100% { transform: translateY(0) scale(1); opacity: 1; }
    }

    @keyframes idleFloat {
      0%, 100% { transform: translateY(0) rotate(-0.35deg); }
      50% { transform: translateY(-8px) rotate(0.35deg); }
    }

    .control-dock {
      position: absolute;
      left: 24px;
      bottom: 22px;
      z-index: 30;
      display: grid;
      grid-template-columns: minmax(280px, 430px) minmax(300px, 520px);
      align-items: end;
      gap: 16px;
      pointer-events: none;
    }

    .control-surface {
      border: 1px solid rgba(255, 255, 255, 0.7);
      border-radius: 8px;
      background: var(--surface);
      box-shadow: var(--shadow);
      backdrop-filter: blur(20px);
      pointer-events: auto;
    }

    .stats-panel {
      padding: 20px;
    }

    .path-panel {
      padding: 14px;
    }

    .path-tabs {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .path-button {
      display: grid;
      grid-template-columns: 32px minmax(0, 1fr);
      align-items: center;
      gap: 10px;
      width: 100%;
      padding: 10px 12px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.54);
      text-align: left;
      border: 1px solid rgba(23, 32, 51, 0.08);
    }

    .path-button svg {
      width: 28px;
      height: 28px;
      color: var(--accent);
    }

    .path-button strong,
    .path-button span {
      display: block;
      overflow-wrap: anywhere;
    }

    .path-button strong {
      font-size: 0.96rem;
      line-height: 1.1;
    }

    .path-button span {
      margin-top: 3px;
      color: var(--muted);
      font-size: 0.75rem;
      font-weight: 700;
    }

    .path-button[aria-pressed="true"] {
      color: white;
      background: linear-gradient(135deg, var(--accent), color-mix(in srgb, var(--accent) 68%, #111827));
      border-color: rgba(255, 255, 255, 0.72);
      box-shadow: 0 14px 26px color-mix(in srgb, var(--accent) 28%, transparent);
    }

    .path-button[aria-pressed="true"] svg,
    .path-button[aria-pressed="true"] span {
      color: rgba(255, 255, 255, 0.82);
    }

    .stats-header {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: start;
      margin-bottom: 14px;
    }

    .eyebrow {
      margin: 0 0 5px;
      color: var(--accent);
      font-size: 0.76rem;
      font-weight: 900;
      text-transform: uppercase;
    }

    .stage-name {
      margin: 0;
      font-size: clamp(1.35rem, 3vw, 2.15rem);
      line-height: 1.05;
      letter-spacing: 0;
    }

    .click-card {
      min-width: 118px;
      padding: 10px 12px;
      border-radius: 8px;
      color: white;
      background: #172033;
      text-align: right;
      box-shadow: 0 14px 28px rgba(23, 32, 51, 0.18);
    }

    .click-card span {
      display: block;
      color: rgba(255, 255, 255, 0.68);
      font-size: 0.72rem;
      font-weight: 800;
      text-transform: uppercase;
    }

    .click-card strong {
      display: inline-block;
      margin-top: 2px;
      font-size: 2rem;
      line-height: 1;
      font-variant-numeric: tabular-nums;
      transition: transform 120ms ease;
    }

    .progress-copy {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 9px;
      color: var(--muted);
      font-size: 0.9rem;
      font-weight: 750;
    }

    .progress-percent {
      color: var(--ink);
      font-variant-numeric: tabular-nums;
    }

    .progress-track {
      position: relative;
      height: 13px;
      border-radius: 999px;
      overflow: hidden;
      background: rgba(23, 32, 51, 0.12);
      box-shadow: inset 0 1px 3px rgba(23, 32, 51, 0.18);
    }

    .progress-fill {
      width: 0%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--accent-2), var(--accent), var(--accent-3));
      box-shadow: 0 0 18px var(--glow);
      transition: width 260ms ease-out;
    }

    .milestones {
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      gap: 5px;
      margin-top: 12px;
    }

    .milestone {
      height: 8px;
      border-radius: 999px;
      background: rgba(23, 32, 51, 0.14);
      transition: background 200ms ease, transform 200ms ease;
    }

    .milestone.is-done {
      background: var(--accent);
    }

    .milestone.is-current {
      transform: scaleY(1.8);
      background: var(--accent-3);
    }

    .hint {
      margin: 14px 0 0;
      color: rgba(23, 32, 51, 0.58);
      font-size: 0.86rem;
      font-weight: 700;
      line-height: 1.45;
    }

    .floating-number {
      position: absolute;
      z-index: 80;
      pointer-events: none;
      color: var(--accent-3);
      font-size: 2rem;
      font-weight: 950;
      text-shadow: 0 4px 12px rgba(23, 32, 51, 0.24);
      animation: floatUp 780ms ease-out forwards;
    }

    .particle {
      position: absolute;
      z-index: 70;
      width: var(--size);
      height: var(--size);
      border-radius: 50%;
      pointer-events: none;
      background: var(--color);
      box-shadow: 0 0 14px var(--color);
      animation: particlePop 900ms ease-out forwards;
    }

    .pop {
      animation: textPop 420ms cubic-bezier(0.2, 1.2, 0.3, 1);
    }

    @keyframes floatUp {
      from { opacity: 1; transform: translateY(0) scale(0.82); }
      to { opacity: 0; transform: translate(var(--drift), -112px) scale(1.06); }
    }

    @keyframes particlePop {
      from { opacity: 1; transform: translate(0, 0) scale(1); }
      to { opacity: 0; transform: translate(var(--vx), var(--vy)) scale(0.2); }
    }

    @keyframes textPop {
      0% { transform: scale(1); }
      48% { transform: scale(1.1); }
      100% { transform: scale(1); }
    }

    button:focus-visible {
      outline: 3px solid rgba(23, 32, 51, 0.72);
      outline-offset: 3px;
    }

    @media (hover: hover) and (pointer: fine) {
      .lang-button:hover,
      .path-button:hover {
        transform: translateY(-1px);
      }
    }

    @media (max-width: 920px) {
      .game-shell {
        min-height: 720px;
      }

      .top-bar {
        align-items: flex-start;
        left: 16px;
        right: 16px;
        top: 16px;
      }

      .brand-subtitle {
        max-width: 56vw;
        font-size: 0.84rem;
      }

      .stage {
        padding: 118px 16px 288px;
      }

      .model-wrap {
        width: min(92vw, 540px);
        height: min(48dvh, 470px);
        min-height: 300px;
      }

      .stage-badge {
        right: 10px;
        bottom: 8%;
        min-width: 116px;
      }

      .control-dock {
        left: 12px;
        right: 12px;
        bottom: 12px;
        grid-template-columns: 1fr;
        gap: 10px;
      }

      .path-panel {
        order: -1;
      }

      .path-button {
        grid-template-columns: 1fr;
        justify-items: center;
        text-align: center;
        padding: 10px 8px;
      }

      .path-button span {
        display: none;
      }
    }

    @media (max-width: 560px) {
      .game-shell {
        min-height: 660px;
      }

      .top-bar {
        gap: 10px;
      }

      .brand-title {
        max-width: 66vw;
      }

      .brand-subtitle {
        display: none;
      }

      .lang-switch {
        grid-template-columns: repeat(2, 44px);
      }

      .lang-button {
        padding: 0;
      }

      .stage {
        padding-top: 92px;
        padding-bottom: 310px;
      }

      .model-wrap {
        height: 40dvh;
        min-height: 250px;
      }

      .stage-badge {
        left: 50%;
        right: auto;
        bottom: -4px;
        transform: translateX(-50%);
        text-align: center;
      }

      .stats-panel {
        padding: 16px;
      }

      .stats-header {
        align-items: stretch;
      }

      .click-card {
        min-width: 94px;
      }

      .click-card strong {
        font-size: 1.55rem;
      }

      .hint {
        margin-top: 10px;
        font-size: 0.78rem;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 1ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
        transition-duration: 1ms !important;
      }
    }
  </style>
</head>
<body>
<main id="game-area" class="game-shell" aria-label="Boring Click Game">
  <div class="cloud" style="--cloud-top: 13%; --cloud-size: 180px; --cloud-speed: 46s; --cloud-opacity: 0.72;"></div>
  <div class="cloud" style="--cloud-top: 24%; --cloud-size: 126px; --cloud-speed: 38s; --cloud-opacity: 0.54; animation-delay: -15s;"></div>
  <div class="cloud" style="--cloud-top: 8%; --cloud-size: 220px; --cloud-speed: 58s; --cloud-opacity: 0.48; animation-delay: -31s;"></div>

  <header class="top-bar">
    <div class="brand">
      <h1 id="ui-title" class="brand-title">种树点击模拟器</h1>
      <p id="ui-subtitle" class="brand-subtitle">选择成长路线，点击世界推进下一阶段</p>
    </div>
    <div class="lang-switch control-surface" role="group" aria-label="Language">
      <button class="lang-button" type="button" data-lang="zh" aria-pressed="true">中</button>
      <button class="lang-button" type="button" data-lang="en" aria-pressed="false">EN</button>
    </div>
  </header>

  <section class="stage" aria-live="polite">
    <div id="model-wrap" class="model-wrap">
      <div class="stage-badge">
        <span id="stage-index-label">阶段 1 / 8</span>
        <strong id="entity-name">一颗小种子</strong>
      </div>
      <div id="model-container"></div>
    </div>
  </section>

  <section class="control-dock" aria-label="Game controls">
    <div class="stats-panel control-surface">
      <div class="stats-header">
        <div>
          <p id="stage-label" class="eyebrow">当前阶段</p>
          <h2 id="stage-name" class="stage-name">一颗小种子</h2>
        </div>
        <div class="click-card" aria-label="Click count">
          <span id="clicks-label">点击数</span>
          <strong id="click-count">0</strong>
        </div>
      </div>

      <div class="progress-copy">
        <span id="next-goal">距离进化为【生根发芽】还需 10 次点击</span>
        <span id="progress-percent" class="progress-percent">0%</span>
      </div>
      <div class="progress-track" aria-hidden="true">
        <div id="progress-fill" class="progress-fill"></div>
      </div>
      <div id="milestones" class="milestones" aria-hidden="true"></div>
      <p id="ui-instruction" class="hint">点击屏幕空白处即可成长；每条路线都会单独保存本次页面中的进度。</p>
    </div>

    <nav class="path-panel control-surface" aria-label="Growth path">
      <div class="path-tabs" id="path-tabs"></div>
    </nav>
  </section>
</main>

<script>
  const thresholds = [0, 10, 30, 60, 100, 160, 250, 400];

  const pathThemes = {
    tree: {
      accent: '#2f8f5b',
      accent2: '#8ccf6f',
      accent3: '#f2c85b',
      glow: 'rgba(47, 143, 91, 0.36)',
      skyTop: '#91d7ff',
      skyMid: '#e4f8ff',
      groundTop: '#86c96f',
      groundDeep: '#346344'
    },
    chicken: {
      accent: '#c66a25',
      accent2: '#f6c15d',
      accent3: '#ef4444',
      glow: 'rgba(246, 164, 61, 0.4)',
      skyTop: '#ffc98d',
      skyMid: '#fff0c7',
      groundTop: '#d6a867',
      groundDeep: '#704b2c'
    },
    house: {
      accent: '#2478a6',
      accent2: '#5fc7e5',
      accent3: '#8b7cf6',
      glow: 'rgba(54, 178, 215, 0.4)',
      skyTop: '#88cfff',
      skyMid: '#e9f7ff',
      groundTop: '#8db7aa',
      groundDeep: '#344e68'
    }
  };

  const stageMeta = {
    tree: [
      { scale: 0.28, crown: 0, trunk: 0, fruit: 0, aura: 0 },
      { scale: 0.34, crown: 1, trunk: 0.2, fruit: 0, aura: 0 },
      { scale: 0.45, crown: 2, trunk: 0.4, fruit: 0, aura: 0 },
      { scale: 0.58, crown: 3, trunk: 0.58, fruit: 0, aura: 0 },
      { scale: 0.72, crown: 4, trunk: 0.76, fruit: 0, aura: 0 },
      { scale: 0.86, crown: 5, trunk: 0.9, fruit: 0.2, aura: 0.15 },
      { scale: 0.94, crown: 5, trunk: 1, fruit: 1, aura: 0.28 },
      { scale: 1, crown: 6, trunk: 1.12, fruit: 0.55, aura: 0.62 }
    ],
    chicken: [
      { scale: 0.3, age: 0, plume: 0, tail: 0, aura: 0 },
      { scale: 0.34, age: 0.12, plume: 0, tail: 0, aura: 0 },
      { scale: 0.42, age: 0.28, plume: 0, tail: 0.1, aura: 0 },
      { scale: 0.5, age: 0.42, plume: 0.08, tail: 0.22, aura: 0 },
      { scale: 0.64, age: 0.58, plume: 0.25, tail: 0.42, aura: 0 },
      { scale: 0.76, age: 0.78, plume: 0.5, tail: 0.64, aura: 0.1 },
      { scale: 0.88, age: 0.92, plume: 0.74, tail: 0.84, aura: 0.24 },
      { scale: 1, age: 1, plume: 1, tail: 1, aura: 0.72 }
    ],
    house: [
      { scale: 0.28, floors: 0, tech: 0, aura: 0 },
      { scale: 0.38, floors: 1, tech: 0, aura: 0 },
      { scale: 0.48, floors: 2, tech: 0, aura: 0 },
      { scale: 0.58, floors: 3, tech: 0.08, aura: 0 },
      { scale: 0.68, floors: 4, tech: 0.2, aura: 0 },
      { scale: 0.78, floors: 6, tech: 0.4, aura: 0.08 },
      { scale: 0.9, floors: 8, tech: 0.62, aura: 0.18 },
      { scale: 1, floors: 10, tech: 1, aura: 0.62 }
    ]
  };

  const i18n = {
    zh: {
      titles: { tree: '种树点击模拟器', chicken: '养鸡点击模拟器', house: '建房点击模拟器' },
      subtitle: '选择成长路线，点击世界推进下一阶段',
      tabs: {
        tree: { label: '树木', helper: '从种子到世界之树' },
        chicken: { label: '家禽', helper: '从鸡蛋到不死鸟' },
        house: { label: '建筑', helper: '从篝火到浮空城' }
      },
      stageLabel: '当前阶段',
      clicksLabel: '点击数',
      stageIndex: (current, total) => `阶段 ${current} / ${total}`,
      instruction: '点击屏幕空白处即可成长；每条路线都会单独保存本次页面中的进度。',
      goalReached: '已达到最高形态，继续点击也会记录成长值',
      goalRemaining: (clicks, nextStage) => `距离进化为【${nextStage}】还需 ${clicks} 次点击`,
      stages: {
        tree: ['一颗小种子', '生根发芽', '茁壮小苗', '青葱树苗', '茂盛小树', '参天大树', '硕果累累的大树', '远古世界之树'],
        chicken: ['鸡蛋', '破壳', '探头小鸡', '毛茸茸小鸡', '青年鸡', '成年大公鸡', '黄金斗鸡', '远古不死鸟'],
        house: ['平地篝火', '简易草屋', '温馨木屋', '坚固砖房', '现代别墅', '高层公寓', '摩天大楼', '赛博浮空城']
      }
    },
    en: {
      titles: { tree: 'Tree Planting Click', chicken: 'Chicken Raising Click', house: 'City Building Click' },
      subtitle: 'Choose a growth path, then click the world forward',
      tabs: {
        tree: { label: 'Tree', helper: 'Seed to world tree' },
        chicken: { label: 'Chicken', helper: 'Egg to phoenix' },
        house: { label: 'Building', helper: 'Campfire to sky city' }
      },
      stageLabel: 'Current stage',
      clicksLabel: 'Clicks',
      stageIndex: (current, total) => `Stage ${current} / ${total}`,
      instruction: 'Click open space to grow. Each path keeps its own progress during this page session.',
      goalReached: 'Maximum form reached. Extra clicks still count as growth.',
      goalRemaining: (clicks, nextStage) => `${clicks} clicks until 【${nextStage}】`,
      stages: {
        tree: ['A Tiny Seed', 'Sprouting', 'Sturdy Seedling', 'Lush Sapling', 'Thriving Tree', 'Towering Tree', 'Fruitful Tree', 'Ancient World Tree'],
        chicken: ['Egg', 'Cracking Egg', 'Hatching Chick', 'Baby Chick', 'Young Chicken', 'Adult Rooster', 'Golden Chicken', 'Legendary Phoenix'],
        house: ['Campfire', 'Straw Hut', 'Wooden Cabin', 'Brick House', 'Modern Villa', 'Apartment Building', 'Skyscraper', 'Futuristic Sky City']
      }
    }
  };

  const state = {
    currentPath: 'tree',
    currentLang: 'zh',
    paths: {
      tree: { clicks: 0, stageIndex: 0 },
      chicken: { clicks: 0, stageIndex: 0 },
      house: { clicks: 0, stageIndex: 0 }
    }
  };

  const els = {
    gameArea: document.getElementById('game-area'),
    title: document.getElementById('ui-title'),
    subtitle: document.getElementById('ui-subtitle'),
    pathTabs: document.getElementById('path-tabs'),
    modelWrap: document.getElementById('model-wrap'),
    modelContainer: document.getElementById('model-container'),
    stageIndexLabel: document.getElementById('stage-index-label'),
    entityName: document.getElementById('entity-name'),
    stageLabel: document.getElementById('stage-label'),
    stageName: document.getElementById('stage-name'),
    clicksLabel: document.getElementById('clicks-label'),
    clickCount: document.getElementById('click-count'),
    nextGoal: document.getElementById('next-goal'),
    progressPercent: document.getElementById('progress-percent'),
    progressFill: document.getElementById('progress-fill'),
    milestones: document.getElementById('milestones'),
    instruction: document.getElementById('ui-instruction')
  };

  function icon(path) {
    const icons = {
      tree: '<svg viewBox="0 0 32 32" aria-hidden="true"><path fill="currentColor" d="M16 3 5 16h6L4 25h10v4h4v-4h10l-7-9h6L16 3Z"/></svg>',
      chicken: '<svg viewBox="0 0 32 32" aria-hidden="true"><path fill="currentColor" d="M20 4c1 2 1 4-1 6 4 1 7 4 7 9 0 6-5 10-11 10S4 25 4 19c0-5 4-9 9-9 0-3 2-5 7-6Zm-5 11a2 2 0 1 0 0-4 2 2 0 0 0 0 4Zm8 2 6 2-6 3v-5Z"/></svg>',
      house: '<svg viewBox="0 0 32 32" aria-hidden="true"><path fill="currentColor" d="M4 15 16 5l12 10-2 2v11h-7v-8h-6v8H6V17l-2-2Z"/></svg>'
    };
    return icons[path];
  }

  function modelShell(width, height, inner, scale = 1) {
    const modelWidth = Math.round(width * Math.min(1, Math.max(0.28, scale)));
    return `<svg class="model-svg" style="--model-width:${modelWidth}px" width="${width}" height="${height}" viewBox="0 0 ${width} ${height}" role="img" aria-label="${i18n[state.currentLang].stages[state.currentPath][state.paths[state.currentPath].stageIndex]}">${inner}</svg>`;
  }

  function renderTreeModel(params) {
    const crownSize = params.crown;
    const fruitOpacity = params.fruit;
    const aura = params.aura;
    const seedMode = crownSize === 0;

    if (seedMode) {
      return modelShell(520, 560, `
        <ellipse cx="260" cy="492" rx="124" ry="30" fill="#3b2b1d" opacity="0.2"/>
        <ellipse cx="260" cy="444" rx="82" ry="54" fill="#7a4b2a"/>
        <path d="M214 430 C246 402 282 402 314 430" fill="none" stroke="#3e2a1d" stroke-width="12" stroke-linecap="round"/>
        <path d="M260 390 C268 368 284 354 308 348" fill="none" stroke="#63a957" stroke-width="10" stroke-linecap="round"/>
        <circle cx="311" cy="346" r="16" fill="#9ad36e"/>
      `, params.scale);
    }

    const crownLayers = [
      [260, 166, 88, '#b7e77b'],
      [180, 246, 106, '#75bd5a'],
      [340, 238, 114, '#58a94d'],
      [254, 250, 132, '#3f9444'],
      [150, 318, 82, '#4f9f47'],
      [382, 322, 88, '#357f3c']
    ].slice(0, Math.min(6, crownSize));

    const fruit = fruitOpacity > 0 ? `
      <g opacity="${fruitOpacity}">
        <circle cx="176" cy="274" r="14" fill="#ef4444"/><circle cx="362" cy="260" r="13" fill="#f97316"/>
        <circle cx="260" cy="164" r="12" fill="#facc15"/><circle cx="226" cy="338" r="12" fill="#ef4444"/>
        <circle cx="318" cy="346" r="11" fill="#facc15"/>
      </g>` : '';

    return modelShell(520, 560, `
      <defs>
        <linearGradient id="treeTrunk" x1="0" x2="1"><stop offset="0%" stop-color="#4a2d1b"/><stop offset="52%" stop-color="#7c4a2b"/><stop offset="100%" stop-color="#2c1a11"/></linearGradient>
        <radialGradient id="treeAura" cx="50%" cy="32%" r="55%"><stop offset="0%" stop-color="#ecfccb"/><stop offset="58%" stop-color="#86efac" stop-opacity="0.42"/><stop offset="100%" stop-color="#86efac" stop-opacity="0"/></radialGradient>
      </defs>
      <circle cx="260" cy="238" r="220" fill="url(#treeAura)" opacity="${aura}"/>
      <path d="M260 530 C222 430 224 316 248 228 C254 205 266 205 272 228 C296 316 298 430 260 530 Z" fill="url(#treeTrunk)"/>
      <path d="M252 360 C190 326 144 288 112 220" stroke="#4a2d1b" stroke-width="${18 * params.trunk}" fill="none" stroke-linecap="round"/>
      <path d="M272 344 C334 304 384 250 418 180" stroke="#4a2d1b" stroke-width="${18 * params.trunk}" fill="none" stroke-linecap="round"/>
      ${crownLayers.map(([cx, cy, r, fill]) => `<circle cx="${cx}" cy="${cy}" r="${r}" fill="${fill}"/>`).join('')}
      <path d="M116 320 C178 364 344 368 410 312" fill="none" stroke="#dcfce7" stroke-width="8" opacity="0.52" stroke-linecap="round"/>
      ${fruit}
    `, params.scale);
  }

  function renderChickenModel(params) {
    const isEgg = params.age < 0.2;
    if (isEgg) {
      const crack = params.age > 0 ? '<path d="M238 258 270 288 248 326 286 350 270 394" fill="none" stroke="#d97706" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>' : '';
      return modelShell(520, 560, `
        <ellipse cx="260" cy="492" rx="128" ry="32" fill="#3b2b1d" opacity="0.18"/>
        <path d="M260 116 C344 116 404 220 404 346 C404 442 344 502 260 502 C176 502 116 442 116 346 C116 220 176 116 260 116Z" fill="#fff5d6" stroke="#f2c35f" stroke-width="12"/>
        ${crack}
        <ellipse cx="224" cy="210" rx="34" ry="22" fill="#fffaf0" opacity="0.65"/>
      `, params.scale);
    }

    const tail = params.tail;
    const plume = params.plume;
    const aura = params.aura;
    const bodyFill = params.age > 0.86 ? '#f5b73e' : params.age > 0.55 ? '#fff7d6' : '#f9d84f';
    const wingFill = params.age > 0.86 ? '#ef7b2d' : '#f2c447';
    const tailGroup = tail > 0 ? `
      <g opacity="${tail}">
        <path d="M142 374 C70 330 52 250 74 178 C132 220 174 274 206 342 Z" fill="${wingFill}"/>
        <path d="M128 418 C72 458 38 448 18 410 C88 436 142 398 206 350 Z" fill="#dd5f2a"/>
        <path d="M378 374 C450 330 468 250 446 178 C388 220 346 274 314 342 Z" fill="${wingFill}"/>
        <path d="M392 418 C448 458 482 448 502 410 C432 436 378 398 314 350 Z" fill="#dd5f2a"/>
      </g>` : '';
    const plumeGroup = plume > 0 ? `
      <g opacity="${plume}">
        <path d="M250 142 C270 70 330 72 350 132 C312 112 286 118 266 156 Z" fill="#ef4444"/>
        <path d="M238 146 C214 76 164 84 146 144 C186 120 216 124 238 164 Z" fill="#f97316"/>
        <path d="M260 116 C280 42 232 40 232 104 C246 96 256 102 260 116 Z" fill="#facc15"/>
      </g>` : '';

    return modelShell(520, 560, `
      <defs>
        <radialGradient id="phoenixAura" cx="50%" cy="48%" r="54%"><stop offset="0%" stop-color="#fff7ad"/><stop offset="64%" stop-color="#fb923c" stop-opacity="0.38"/><stop offset="100%" stop-color="#fb923c" stop-opacity="0"/></radialGradient>
      </defs>
      <circle cx="260" cy="292" r="220" fill="url(#phoenixAura)" opacity="${aura}"/>
      <ellipse cx="260" cy="492" rx="148" ry="32" fill="#3b2b1d" opacity="0.18"/>
      ${tailGroup}
      <path d="M214 486 L190 540 M306 486 L334 540" stroke="#d97706" stroke-width="12" stroke-linecap="round"/>
      <ellipse cx="260" cy="368" rx="104" ry="132" fill="${bodyFill}"/>
      <path d="M196 366 C156 352 134 320 134 282 C178 296 206 324 224 360 Z" fill="${wingFill}" opacity="0.86"/>
      <circle cx="278" cy="210" r="70" fill="${bodyFill}"/>
      ${plumeGroup}
      <circle cx="256" cy="194" r="9" fill="#111827"/>
      <circle cx="253" cy="190" r="3" fill="#ffffff"/>
      <path d="M318 214 L390 232 L318 256 Z" fill="#f59e0b"/>
      <path d="M294 268 C322 288 324 314 292 310" fill="#ef4444" opacity="${Math.max(0.35, plume)}"/>
      <path d="M210 390 C246 426 304 426 344 388" fill="none" stroke="#fffaf0" stroke-width="10" opacity="0.62" stroke-linecap="round"/>
    `, params.scale);
  }

  function renderHouseModel(params) {
    const floors = params.floors;
    const tech = params.tech;
    const aura = params.aura;

    if (floors === 0) {
      return modelShell(520, 560, `
        <ellipse cx="260" cy="500" rx="150" ry="32" fill="#3b2b1d" opacity="0.18"/>
        <path d="M210 470 C246 420 240 376 260 318 C282 376 274 420 314 470 C280 498 244 498 210 470 Z" fill="#f97316"/>
        <path d="M238 464 C258 428 252 390 268 354 C286 394 286 430 308 464 C284 482 260 484 238 464 Z" fill="#fde047"/>
        <path d="M160 506 H360" stroke="#6b4226" stroke-width="18" stroke-linecap="round"/>
        <path d="M190 500 H330" stroke="#3f2a1d" stroke-width="10" stroke-linecap="round"/>
      `, params.scale);
    }

    const isTower = floors >= 6;
    const width = isTower ? 170 : 260;
    const baseX = 260 - width / 2;
    const height = isTower ? 70 + floors * 34 : 120 + floors * 20;
    const y = 500 - height;
    const windowRows = Array.from({ length: Math.min(8, floors + 1) }, (_, row) => row);
    const windowCols = isTower ? [0, 1, 2] : [0, 1, 2, 3];
    const windows = windowRows.map((row) => windowCols.map((col) => {
      const wx = baseX + 28 + col * (isTower ? 40 : 52);
      const wy = y + 36 + row * 38;
      if (wy > 452) return '';
      return `<rect x="${wx}" y="${wy}" width="${isTower ? 22 : 28}" height="24" rx="4" fill="${tech > 0.55 ? '#ecfeff' : '#bae6fd'}" opacity="${0.74 + tech * 0.2}"/>`;
    }).join('')).join('');
    const roof = isTower
      ? `<path d="M${baseX} ${y} L260 ${Math.max(52, y - 86)} L${baseX + width} ${y} Z" fill="${tech > 0.55 ? '#a5f3fc' : '#586577'}"/>`
      : `<path d="M${baseX - 34} ${y + 10} L260 ${y - 64} L${baseX + width + 34} ${y + 10} Z" fill="#51443b"/>`;
    const techLines = tech > 0 ? `
      <g opacity="${tech}">
        <path d="M72 444 C160 394 360 394 448 444" fill="none" stroke="#67e8f9" stroke-width="6" stroke-linecap="round"/>
        <path d="M112 518 C200 468 320 468 408 518" fill="none" stroke="#22d3ee" stroke-width="5" opacity="0.58" stroke-linecap="round"/>
        <circle cx="260" cy="${Math.max(34, y - 108)}" r="18" fill="#ecfeff"/>
      </g>` : '';

    return modelShell(520, 560, `
      <defs>
        <linearGradient id="buildingBody" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${tech > 0.55 ? '#cffafe' : '#f6f2e8'}"/><stop offset="52%" stop-color="${tech > 0.55 ? '#22d3ee' : '#d0c7b8'}"/><stop offset="100%" stop-color="${tech > 0.55 ? '#155e75' : '#8f7f6b'}"/></linearGradient>
        <radialGradient id="cityAura" cx="50%" cy="42%" r="58%"><stop offset="0%" stop-color="#ecfeff"/><stop offset="60%" stop-color="#22d3ee" stop-opacity="0.36"/><stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/></radialGradient>
      </defs>
      <circle cx="260" cy="280" r="224" fill="url(#cityAura)" opacity="${aura}"/>
      <ellipse cx="260" cy="500" rx="174" ry="34" fill="#1f2937" opacity="0.28"/>
      ${roof}
      <rect x="${baseX}" y="${y}" width="${width}" height="${height}" rx="${isTower ? 14 : 8}" fill="url(#buildingBody)"/>
      ${windows}
      <rect x="${260 - (isTower ? 23 : 32)}" y="${500 - (isTower ? 58 : 64)}" width="${isTower ? 46 : 64}" height="${isTower ? 58 : 64}" rx="5" fill="${tech > 0.55 ? '#164e63' : '#5d4037'}"/>
      ${techLines}
    `, params.scale);
  }

  const modelRenderers = {
    tree: renderTreeModel,
    chicken: renderChickenModel,
    house: renderHouseModel
  };

  function currentData() {
    return state.paths[state.currentPath];
  }

  function getStageIndex(clicks) {
    for (let i = thresholds.length - 1; i >= 0; i--) {
      if (clicks >= thresholds[i]) return i;
    }
    return 0;
  }

  function applyTheme() {
    const theme = pathThemes[state.currentPath];
    Object.entries({
      '--accent': theme.accent,
      '--accent-2': theme.accent2,
      '--accent-3': theme.accent3,
      '--glow': theme.glow,
      '--sky-top': theme.skyTop,
      '--sky-mid': theme.skyMid,
      '--ground-top': theme.groundTop,
      '--ground-deep': theme.groundDeep
    }).forEach(([key, value]) => document.documentElement.style.setProperty(key, value));
  }

  function renderPathTabs() {
    const lang = i18n[state.currentLang];
    els.pathTabs.innerHTML = Object.keys(state.paths).map((path) => {
      const pathState = state.paths[path];
      const isActive = path === state.currentPath;
      return `
        <button class="path-button" type="button" data-path="${path}" aria-pressed="${isActive}">
          ${icon(path)}
          <span>
            <strong>${lang.tabs[path].label}</strong>
            <span>${lang.tabs[path].helper} · ${pathState.clicks}</span>
          </span>
        </button>`;
    }).join('');
  }

  function renderMilestones(stageIndex) {
    els.milestones.innerHTML = thresholds.map((_, index) => {
      const className = index < stageIndex ? 'milestone is-done' : index === stageIndex ? 'milestone is-current' : 'milestone';
      return `<span class="${className}"></span>`;
    }).join('');
  }

  function renderModel(stageIndex) {
    const params = stageMeta[state.currentPath][stageIndex];
    els.modelContainer.innerHTML = modelRenderers[state.currentPath](params);
  }

  function updateUI(options = {}) {
    const lang = i18n[state.currentLang];
    const data = currentData();
    const nextStageIndex = getStageIndex(data.clicks);
    const changedStage = nextStageIndex !== data.stageIndex || options.forceModel;
    data.stageIndex = nextStageIndex;
    const stageName = lang.stages[state.currentPath][data.stageIndex];

    applyTheme();
    document.documentElement.lang = state.currentLang === 'zh' ? 'zh-CN' : 'en';
    document.title = lang.titles[state.currentPath];
    els.title.textContent = lang.titles[state.currentPath];
    els.subtitle.textContent = lang.subtitle;
    els.stageLabel.textContent = lang.stageLabel;
    els.clicksLabel.textContent = lang.clicksLabel;
    els.instruction.textContent = lang.instruction;
    els.entityName.textContent = stageName;
    els.stageName.textContent = stageName;
    els.stageIndexLabel.textContent = lang.stageIndex(data.stageIndex + 1, thresholds.length);
    els.clickCount.textContent = data.clicks;

    if (changedStage) {
      renderModel(data.stageIndex);
      els.stageName.classList.remove('pop');
      void els.stageName.offsetWidth;
      els.stageName.classList.add('pop');
    }

    const currentThreshold = thresholds[data.stageIndex];
    const nextThreshold = thresholds[data.stageIndex + 1] ?? currentThreshold;
    let progress = 100;
    if (data.stageIndex < thresholds.length - 1) {
      progress = ((data.clicks - currentThreshold) / (nextThreshold - currentThreshold)) * 100;
      const nextName = lang.stages[state.currentPath][data.stageIndex + 1];
      els.nextGoal.textContent = lang.goalRemaining(nextThreshold - data.clicks, nextName);
    } else {
      els.nextGoal.textContent = lang.goalReached;
    }

    const clampedProgress = Math.max(0, Math.min(100, progress));
    els.progressFill.style.width = `${clampedProgress}%`;
    els.progressPercent.textContent = `${Math.round(clampedProgress)}%`;
    renderMilestones(data.stageIndex);
    renderPathTabs();
  }

  function switchPath(path) {
    if (!state.paths[path] || path === state.currentPath) return;
    state.currentPath = path;
    updateUI({ forceModel: true });
  }

  function switchLang(lang) {
    if (!i18n[lang] || lang === state.currentLang) return;
    state.currentLang = lang;
    document.querySelectorAll('.lang-button').forEach((button) => {
      button.setAttribute('aria-pressed', String(button.dataset.lang === lang));
    });
    updateUI({ forceModel: true });
  }

  function showFloatingText(x, y) {
    const text = document.createElement('div');
    text.className = 'floating-number';
    text.textContent = '+1';
    text.style.left = `${x - 18}px`;
    text.style.top = `${y - 26}px`;
    text.style.setProperty('--drift', `${Math.round((Math.random() - 0.5) * 70)}px`);
    els.gameArea.appendChild(text);
    setTimeout(() => text.remove(), 820);
  }

  function spawnUpgradeParticles() {
    const rect = els.modelWrap.getBoundingClientRect();
    const centerX = rect.left + rect.width / 2;
    const centerY = rect.top + rect.height * 0.54;
    const colors = [pathThemes[state.currentPath].accent, pathThemes[state.currentPath].accent2, pathThemes[state.currentPath].accent3, '#ffffff'];

    for (let i = 0; i < 34; i++) {
      const particle = document.createElement('span');
      const angle = Math.random() * Math.PI * 2;
      const distance = 58 + Math.random() * 150;
      const size = 5 + Math.random() * 9;
      particle.className = 'particle';
      particle.style.left = `${centerX}px`;
      particle.style.top = `${centerY}px`;
      particle.style.setProperty('--size', `${size}px`);
      particle.style.setProperty('--vx', `${Math.cos(angle) * distance}px`);
      particle.style.setProperty('--vy', `${Math.sin(angle) * distance}px`);
      particle.style.setProperty('--color', colors[Math.floor(Math.random() * colors.length)]);
      document.body.appendChild(particle);
      setTimeout(() => particle.remove(), 940);
    }
  }

  function registerClick(x, y) {
    const data = currentData();
    const previousStage = data.stageIndex;
    data.clicks += 1;
    showFloatingText(x, y);
    els.clickCount.style.transform = 'scale(1.12)';
    setTimeout(() => { els.clickCount.style.transform = 'scale(1)'; }, 120);
    updateUI();

    if (data.stageIndex !== previousStage) {
      spawnUpgradeParticles();
    }
  }

  els.pathTabs.addEventListener('click', (event) => {
    const button = event.target.closest('[data-path]');
    if (!button) return;
    switchPath(button.dataset.path);
  });

  document.querySelectorAll('.lang-button').forEach((button) => {
    button.addEventListener('click', () => switchLang(button.dataset.lang));
  });

  els.gameArea.addEventListener('pointerdown', (event) => {
    if (event.button !== 0 || event.target.closest('.control-surface')) return;
    registerClick(event.clientX, event.clientY);
  });

  updateUI({ forceModel: true });
</script>
</body>
</html>
