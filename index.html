<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="google-site-verification" content="cz4d76ykcj0Z1xXppq1iQ9KqiNwfwG08beyUT-sjcko">
  <meta name="description" content="Play Boring Click Game, a free online clicker game where every click grows trees, chickens, and buildings through relaxing evolution stages.">
  <meta name="keywords" content="Boring Click Game, free online clicker game, clicker game, incremental game, idle clicker, browser game">
  <meta name="robots" content="index, follow">
  <meta name="application-name" content="Boring Click Game">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://boring-click-game.vercel.app/">
  <meta property="og:title" content="Boring Click Game - Free Online Clicker Game">
  <meta property="og:description" content="Play a quiet incremental clicker where every click grows simple things into surprising final forms.">
  <meta property="og:site_name" content="Boring Click Game">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Boring Click Game - Free Online Clicker Game">
  <meta name="twitter:description" content="A free online clicker game about growing trees, chickens, and buildings one click at a time.">
  <meta name="theme-color" content="#f7efe2">
  <link rel="canonical" href="https://boring-click-game.vercel.app/">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <title>Boring Click Game - Free Online Clicker Game</title>
  <link rel="stylesheet" href="src/styles.css">
  <script src="src/game.js" defer></script>
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Game",
      "name": "Boring Click Game",
      "url": "https://boring-click-game.vercel.app/",
      "description": "A free online clicker game where every click grows trees, chickens, and buildings through relaxing evolution stages.",
      "genre": ["Clicker", "Incremental", "Browser Game"],
      "inLanguage": "en",
      "isAccessibleForFree": true,
      "applicationCategory": "Game",
      "operatingSystem": "Any"
    }
  </script>
</head>
<body>
<main id="game-area" class="game-shell" aria-label="Boring Click Game">
  <div class="sky-orbit" aria-hidden="true"></div>
  <div class="horizon-lines" aria-hidden="true">
    <span style="--x: 8%; --w: 18%; --d: 0s;"></span>
    <span style="--x: 33%; --w: 12%; --d: -4s;"></span>
    <span style="--x: 68%; --w: 22%; --d: -8s;"></span>
  </div>

  <header class="top-bar">
    <div class="brand" aria-live="polite">
      <p id="ui-kicker" class="brand-kicker">Quiet Growth Lab</p>
      <h1 id="ui-title" class="brand-title">Boring Click Game</h1>
      <p id="ui-subtitle" class="brand-subtitle">Choose a growth path, then click the world forward</p>
    </div>

    <div class="top-actions">
      <button id="sound-toggle" class="icon-button control-surface" type="button" aria-pressed="true" aria-label="Sound on">
        <span aria-hidden="true">♪</span>
      </button>
      <div class="lang-switch control-surface" role="group" aria-label="Language">
        <button class="lang-button" type="button" data-lang="zh" aria-pressed="false">中</button>
        <button class="lang-button" type="button" data-lang="en" aria-pressed="true">EN</button>
      </div>
    </div>
  </header>

  <section class="stage" aria-live="polite">
    <div id="model-wrap" class="model-wrap" tabindex="0" role="button" aria-label="Click to grow">
      <div class="stage-ring" aria-hidden="true"></div>
      <div class="stage-badge">
        <span id="stage-index-label">Stage 1 / 8</span>
        <strong id="entity-name">A Tiny Seed</strong>
      </div>
      <div id="model-container" class="model-container"></div>
    </div>
  </section>

  <section class="control-dock" aria-label="Game controls">
    <div class="stats-panel control-surface">
      <div class="stats-header">
        <div>
          <p id="stage-label" class="eyebrow">Current stage</p>
          <h2 id="stage-name" class="stage-name">A Tiny Seed</h2>
        </div>
        <div class="click-card" aria-label="Click count">
          <span id="clicks-label">Clicks</span>
          <strong id="click-count">0</strong>
        </div>
      </div>

      <div class="progress-copy">
        <span id="next-goal">10 clicks until 【Sprouting】</span>
        <span id="progress-percent" class="progress-percent">0%</span>
      </div>
      <div class="progress-track" aria-hidden="true">
        <div id="progress-fill" class="progress-fill"></div>
      </div>
      <div id="milestones" class="milestones" aria-hidden="true"></div>

      <div class="stats-footer">
        <p id="ui-instruction" class="hint">Click open space or press Space to grow. Each path saves automatically.</p>
        <button id="reset-button" class="reset-button" type="button">Reset path</button>
      </div>
    </div>

    <nav class="path-panel control-surface" aria-label="Growth path">
      <div class="path-tabs" id="path-tabs"></div>
    </nav>
  </section>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>
</main>
</body>
</html>
