<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Boring Click Game</title>
  <!-- 引入 Tailwind CSS 用于快速页面布局和基础样式 -->
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* 全局样式禁止文本选中，优化快速点击体验 */
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(180deg, #1e3a5f 0%, #2d5a87 30%, #3d7cb3 50%, #8b6f47 50%, #6b5337 70%, #4a3728 100%);
    }

    /* 动态背景天空 - 增强渐变效果 */
    #sky {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 60%;
      background: linear-gradient(180deg, #0ea5e9 0%, #38bdf8 30%, #7dd3fc 60%, #bae6fd 100%);
      z-index: 1;
    }

    /* 动态背景地面 - 更丰富的层次 */
    #ground {
      position: absolute;
      bottom: 0; left: 0; width: 100%; height: 40%;
      background: linear-gradient(180deg, #4ade80 0%, #22c55e 10%, #16a34a 20%, #854d0e 25%, #713f12 40%, #522a0f 60%, #3d1f0b 100%);
      border-top: 8px solid #86efac;
      box-shadow: 0 -10px 40px rgba(74, 222, 128, 0.3);
      z-index: 2;
    }

    /* 太阳呼吸灯动画 - 更柔和的光晕 */
    .sun {
      position: absolute;
      top: 40px; right: 60px;
      width: 100px; height: 100px;
      background: radial-gradient(circle, #fef3c7 0%, #fde047 40%, #fbbf24 100%);
      border-radius: 50%;
      box-shadow: 0 0 60px #fbbf24, 0 0 120px #f59e0b, 0 0 180px rgba(251, 191, 36, 0.4);
      animation: sunPulse 5s infinite alternate cubic-bezier(0.4, 0, 0.6, 1);
      z-index: 3;
    }
    @keyframes sunPulse {
      0% { transform: scale(1) rotate(0deg); box-shadow: 0 0 50px #fbbf24, 0 0 100px #f59e0b; }
      100% { transform: scale(1.2) rotate(5deg); box-shadow: 0 0 80px #fbbf24, 0 0 160px #f59e0b, 0 0 240px rgba(251, 191, 36, 0.6); }
    }

    /* 云朵飘动动画 - 更流畅的缓动 */
    .cloud-wrap {
      position: absolute;
      z-index: 3;
      opacity: 0.85;
      will-change: transform;
      filter: drop-shadow(0 4px 8px rgba(255, 255, 255, 0.3));
    }
    @keyframes floatCloud {
      0% { transform: translateX(-250px) scale(var(--scale, 1)); }
      100% { transform: translateX(110vw) scale(var(--scale, 1)); }
    }

    /* 树木容器，固定在地面分界线 */
    #tree-container {
      position: absolute;
      bottom: 40%;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      pointer-events: none;
      filter: drop-shadow(0 8px 16px rgba(0, 0, 0, 0.3));
    }

    #tree-container::before {
      content: "";
      position: absolute;
      left: 50%;
      bottom: -22px;
      width: clamp(110px, 30vw, 360px);
      height: clamp(28px, 7vw, 84px);
      transform: translateX(-50%);
      border-radius: 50%;
      background: radial-gradient(ellipse, var(--stage-glow, rgba(74, 222, 128, 0.32)) 0%, rgba(255,255,255,0) 70%);
      filter: blur(4px);
      z-index: -1;
    }

    #tree-container::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: -18px;
      width: clamp(70px, 18vw, 220px);
      height: clamp(14px, 3vw, 34px);
      transform: translateX(-50%);
      border-radius: 50%;
      background: rgba(36, 24, 12, 0.26);
      filter: blur(6px);
      z-index: -1;
    }

    #tree-container[data-path="tree"] { --stage-glow: rgba(74, 222, 128, 0.42); }
    #tree-container[data-path="chicken"] { --stage-glow: rgba(251, 191, 36, 0.48); }
    #tree-container[data-path="house"] { --stage-glow: rgba(34, 211, 238, 0.38); }

    #tree-container[data-stage="0"]::before,
    #tree-container[data-stage="1"]::before {
      width: clamp(80px, 18vw, 180px);
      opacity: 0.65;
    }

    #tree-container[data-stage="6"]::before,
    #tree-container[data-stage="7"]::before {
      opacity: 0.95;
      animation: auraPulse 2.8s ease-in-out infinite alternate;
    }

    @keyframes auraPulse {
      from { transform: translateX(-50%) scale(0.9); opacity: 0.55; }
      to { transform: translateX(-50%) scale(1.12); opacity: 1; }
    }

    /* 树木生长时的弹性动画 - 更流畅 */
    .tree-svg {
      transform-origin: bottom center;
      animation: growBounce 1s cubic-bezier(0.34, 1.56, 0.64, 1);
      display: block;
      max-width: min(52vw, 520px);
      max-height: 70vh;
      height: auto;
      overflow: visible;
      transition: filter 0.3s ease, transform 0.3s ease;
      filter: saturate(1.12) contrast(1.04) drop-shadow(0 18px 22px rgba(0, 0, 0, 0.32));
    }
    #tree-container[data-stage="3"] .tree-svg,
    #tree-container[data-stage="4"] .tree-svg,
    #tree-container[data-stage="5"] .tree-svg {
      animation: growBounce 1s cubic-bezier(0.34, 1.56, 0.64, 1), gentleSway 4.8s ease-in-out infinite 1s;
    }
    #tree-container[data-stage="6"] .tree-svg,
    #tree-container[data-stage="7"] .tree-svg {
      animation: growBounce 1s cubic-bezier(0.34, 1.56, 0.64, 1), legendaryFloat 3.8s ease-in-out infinite 1s;
      filter: saturate(1.24) contrast(1.08) drop-shadow(0 0 22px var(--stage-glow)) drop-shadow(0 22px 28px rgba(0, 0, 0, 0.35));
    }
    .tree-svg:hover {
      filter: brightness(1.1) drop-shadow(0 12px 24px rgba(0,0,0,0.4));
    }
    @keyframes growBounce {
      0% { transform: scale(0.2); opacity: 0; filter: brightness(2); }
      40% { transform: scale(1.15); filter: brightness(1.3); }
      70% { transform: scale(0.95); filter: brightness(0.95); }
      100% { transform: scale(1); opacity: 1; filter: brightness(1); }
    }
    @keyframes gentleSway {
      0%, 100% { transform: rotate(-0.8deg); }
      50% { transform: rotate(0.8deg); }
    }
    @keyframes legendaryFloat {
      0%, 100% { transform: translateY(0) rotate(-0.5deg); }
      50% { transform: translateY(-10px) rotate(0.5deg); }
    }

    #ui-panel {
      top: 24px;
      left: 24px;
      width: min(360px, calc(100vw - 48px));
      min-width: 0;
      transform: none;
      border-radius: 24px;
      text-align: left;
      opacity: 0.58;
      transition: opacity 0.25s ease, box-shadow 0.3s ease, transform 0.3s ease;
    }

    #ui-panel:hover,
    #ui-panel:focus-within {
      opacity: 0.98;
    }

    #path-select,
    #lang-select {
      border-radius: 999px;
      max-width: 100%;
    }

    #stage-line,
    #next-goal,
    #ui-instruction {
      line-height: 1.35;
    }

    @media (max-width: 760px) {
      .sun {
        top: 72px;
        right: 24px;
        width: 72px;
        height: 72px;
      }

      #tree-container {
        bottom: clamp(330px, 46vh, 430px);
      }

      .tree-svg {
        max-width: 74vw;
        max-height: 42vh;
      }

      #ui-panel {
        top: auto;
        bottom: 14px;
        left: 14px;
        right: 14px;
        width: auto;
        padding: 16px 18px;
        border-radius: 20px;
        opacity: 0.36;
      }

      #ui-panel:hover,
      #ui-panel:focus-within {
        opacity: 0.96;
      }

      #ui-title {
        font-size: 1.35rem;
        line-height: 1.15;
      }

      #click-count-row {
        font-size: 2.75rem;
        margin-bottom: 0.75rem;
      }
    }

    /* 漂浮的 +1 文字动画 - 更华丽 */
    .floating-number {
      position: absolute;
      color: #fbbf24;
      font-size: 36px;
      font-weight: 900;
      pointer-events: none;
      text-shadow: 0 4px 0 #f59e0b, 0 6px 12px rgba(0,0,0,0.5), 0 0 20px rgba(251, 191, 36, 0.6);
      animation: floatUp 1s cubic-bezier(0.4, 0, 0.2, 1) forwards;
      z-index: 100;
    }
    @keyframes floatUp {
      0% { opacity: 1; transform: translate(0, 0) scale(0.6) rotate(-10deg); }
      20% { transform: translate(calc(var(--drift) * 0.3), -40px) scale(1.3) rotate(5deg); }
      100% { opacity: 0; transform: translate(var(--drift), -180px) scale(1) rotate(0deg); }
    }

    /* 升级时的粒子特效 - 更绚丽 */
    .particle {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      z-index: 50;
      animation: particleExplode 1.2s cubic-bezier(0.1, 0.8, 0.3, 1) forwards;
      box-shadow: 0 0 12px currentColor;
    }
    @keyframes particleExplode {
      0% { transform: translate(0, 0) scale(1); opacity: 1; }
      100% { transform: translate(var(--vx), var(--vy)) scale(0); opacity: 0; }
    }

    /* 升级时文字弹跳动画 - 更生动 */
    .pop-text {
      animation: popTextAnim 0.7s cubic-bezier(0.68, -0.55, 0.265, 1.55);
    }
    @keyframes popTextAnim {
      0% { transform: scale(1); color: #16a34a; text-shadow: none; }
      50% { transform: scale(1.5); color: #f59e0b; text-shadow: 0 0 20px #fcd34d, 0 0 40px #fbbf24; }
      100% { transform: scale(1); color: #16a34a; text-shadow: 0 4px 8px rgba(0,0,0,0.2); }
    }

    /* 自定义下拉框选项样式 */
    #path-select option {
      background-color: #047857;
      color: white;
      padding: 12px 20px;
      font-weight: bold;
      font-size: 16px;
    }
    #lang-select option {
      background-color: #1d4ed8;
      color: white;
      padding: 12px 20px;
      font-weight: bold;
      font-size: 16px;
    }
  </style>
</head>
<body id="game-area" class="cursor-pointer">

<!-- 背景元素 -->
<div id="sky"></div>
<div id="ground"></div>
<div class="sun"></div>

<!-- 动态云朵 -->
<div class="cloud-wrap" style="top: 15%; animation: floatCloud 45s linear infinite; --scale: 1;">
  <svg width="150" height="60" viewBox="0 0 150 60" fill="white">

  </svg>
</div>
<div class="cloud-wrap" style="top: 8%; animation: floatCloud 35s linear infinite; animation-delay: -15s; transform: scale(0.8); opacity: 0.6; --scale: 0.8;">
  <svg width="150" height="60" viewBox="0 0 150 60" fill="white">
    <circle cx="30" cy="40" r="20"/><circle cx="70" cy="25" r="25"/><circle cx="110" cy="35" r="20"/><rect x="30" y="25" width="80" height="35" rx="15"/>
  </svg>
</div>
<div class="cloud-wrap" style="top: 25%; animation: floatCloud 50s linear infinite; animation-delay: -30s; transform: scale(1.2); opacity: 0.9; --scale: 1.2;">

    <circle cx="30" cy="40" r="20"/><circle cx="70" cy="25" r="25"/><circle cx="110" cy="35" r="20"/><rect x="30" y="25" width="80" height="35" rx="15"/>
  </svg>
</div>

<!-- 新增语言选择器 -->
<div class="absolute top-4 right-4 z-[100] pointer-events-auto">
  <select id="lang-select" class="bg-gradient-to-r from-blue-500/90 to-cyan-500/90 backdrop-blur-md border-2 border-white/80 text-white py-2.5 px-5 rounded-full shadow-xl focus:outline-none focus:ring-4 focus:ring-blue-300/50 cursor-pointer font-bold transition-all duration-300 hover:from-blue-600 hover:to-cyan-600 hover:shadow-[0_8px_30px_rgba(37,99,235,0.5)] hover:scale-105 text-sm drop-shadow-[0_3px_6px_rgba(0,0,0,0.3)]">
    <option value="en">English</option>
    <option value="zh">中文</option>
  </select>
</div>

<!-- UI 面板 -->
<div id="ui-panel" class="absolute bg-gradient-to-br from-white/95 via-emerald-50/90 to-sky-50/95 backdrop-blur-xl px-6 py-5 shadow-[0_18px_50px_-18px_rgba(15,23,42,0.45)] z-50 pointer-events-auto border border-white/80 transition-all duration-300 hover:shadow-[0_24px_60px_-18px_rgba(15,23,42,0.55)]">

  <!-- 新增：成长路径选择器 -->
  <div class="mb-4 pointer-events-auto">
    <select id="path-select" class="w-full bg-gradient-to-r from-emerald-500 via-green-500 to-teal-500 backdrop-blur-md border border-white/90 text-white py-3 px-4 shadow-[0_10px_32px_-14px_rgba(16,185,129,0.75)] focus:outline-none focus:ring-4 focus:ring-emerald-300/50 cursor-pointer font-bold transition-all duration-300 hover:from-emerald-600 hover:via-green-600 hover:to-teal-600 text-base drop-shadow-[0_3px_6px_rgba(0,0,0,0.25)]">
      <option value="tree">🌲 Tree</option>
      <option value="chicken">🐔 Chicken</option>
      <option value="house">🏠 House</option>
    </select>
  </div>

  <h1 id="ui-title" class="text-3xl font-black mb-2 drop-shadow-[0_2px_4px_rgba(0,0,0,0.16)] transition-colors text-green-700">🌲 Tree Planting</h1>
  <p id="stage-line" class="text-gray-700 mb-4 font-semibold text-base"><span id="ui-current-stage">Current Stage: </span><span id="entity-name" class="font-bold inline-block transition-colors text-green-600">A Tiny Seed</span></p>

  <div id="click-count-row" class="text-5xl font-black text-amber-500 mb-4 drop-shadow-[0_4px_8px_rgba(245,158,11,0.35)] tracking-tight">
    <span id="click-count">0</span> <span id="ui-clicks-unit" class="text-2xl text-amber-600 font-bold tracking-normal">clicks</span>
  </div>

  <!-- 进度条 - 增强版 -->
  <div class="w-full bg-gray-200/80 rounded-full h-5 mb-3 overflow-hidden shadow-inner relative border border-gray-300/50">
    <div id="progress-fill" class="h-full rounded-full transition-all duration-500 ease-out bg-gradient-to-r from-green-400 via-green-500 to-green-600 shadow-[0_0_20px_rgba(34,197,94,0.5)]" style="width: 0%"></div>
  </div>
  <p id="next-goal" class="text-sm text-gray-600 font-semibold">10 more clicks to reach the next stage</p>

  <p id="ui-instruction" class="text-xs text-gray-400 mt-5 border-t border-gray-200 pt-3 font-medium">👆 Click (or tap) anywhere on the screen like crazy!</p>
</div>

<!-- 实体容器 -->
<div id="tree-container">

</div>

    chicken: {

"220" width="14" height="32" rx="3"/><rect x="274" y="220" width="14" height="32" rx="3"/><rect x="250" y="272" width="14" height="32" rx="3"/><rect x="274" y="272" width="14" height="32" rx="3"/><rect x="336" y="292" width="14" height="26" rx="3"/><rect x="336" y="336" width="14" height="26" rx="3"/></g><circle cx="126" cy="270" r="7" fill="#fff"/><circle cx="402" cy="298" r="6" fill="#cffafe"/><circle cx="268" cy="86" r="8" fill="#fff"/><path d="M68 408 C154 350 366 350 452 408" stroke="#67e8f9" stroke-width="3" fill="none" opacity="0.7"/><path d="M114 520 C200 470 320 470 406 520" stroke="#22d3ee" stroke-width="5" fill="none" opacity="0.45"/></svg>` }

  let currentPath = 'tree';

    chicken: { clicks: 0, stageIndex: 0 },
    house: { clicks: 0, stageIndex: 0 }
  };
  let currentLang = 'zh';

  // DOM 元素引用
  const gameArea = document.getElementById('game-area');
  const treeContainer = document.getElementById('tree-container');
  const clickCountEl = document.getElementById('click-count');
  const entityNameEl = document.getElementById('entity-name');
  const progressFill = document.getElementById('progress-fill');
  const nextGoalEl = document.getElementById('next-goal');
  const langSelect = document.getElementById('lang-select');
  const pathSelect = document.getElementById('path-select');

  // 多语言字典
  const i18n = {
    en: {
      titles: { tree: "🌲 Tree Planting", chicken: "🐔 Chicken Raising", house: "🏠 City Building" },
      tabs: { tree: "Tree", chicken: "Chicken", house: "Building" },

      instruction: "👆 Click (or tap) anywhere on the screen like crazy!",

      goalReached: "🎉 恭喜！已达到最高进化形态！",
      goalRemaining: (clicks, nextStage) => `距离进化为【${nextStage}】还需 ${clicks} 次点击`,
      stages: {
        tree: ["一颗小种子", "生根发芽", "茁壮小苗", "青葱树苗", "茂盛小树", "参天大树", "硕果累累的大树", "远古世界之树"],

      }
    }

  // 初始化
  function init() {
    langSelect.value = currentLang;
    updateLanguageUI();
    updateVisuals(true);
  }

  function applyStagePresentation(stageIndex) {
    treeContainer.dataset.path = currentPath;
    treeContainer.dataset.stage = String(stageIndex);

    const svg = treeContainer.querySelector('svg');
    if (!svg) return;

    svg.setAttribute('preserveAspectRatio', 'xMidYMax meet');
    svg.classList.add('tree-svg');

    if (stageIndex >= 6) {
      svg.classList.add('legendary-stage');
    }
  }

  // 监听成长路径切换
  pathSelect.addEventListener('change', (e) => {
    const selectedPath = e.target.value;
    if (selectedPath !== currentPath) {
      currentPath = selectedPath;
      updateLanguageUI();
      updateVisuals(true); // true 代表静默切换，不播放粒子爆炸特效
    }
  });

  // 更新静态文本语言
  function updateLanguageUI() {
    const langData = i18n[currentLang];

    document.getElementById('ui-title').innerText = langData.titles[currentPath];
    document.title = langData.titles[currentPath];

    // 更新下拉框选项文本
    pathSelect.options[0].text = `🌲 ${langData.tabs.tree}`;
    pathSelect.options[1].text = `🐔 ${langData.tabs.chicken}`;
    pathSelect.options[2].text = `🏠 ${langData.tabs.house}`;
    pathSelect.value = currentPath;

    document.getElementById('ui-current-stage').innerText = langData.currentStage;
    document.getElementById('ui-clicks-unit').innerText = langData.clicksUnit;
    document.getElementById('ui-instruction').innerText = langData.instruction;
  }

  // 监听语言切换
  langSelect.addEventListener('change', (e) => {
    currentLang = e.target.value;
    updateLanguageUI();
    updateVisuals(true);
  });

  // 创建升级粒子特效
  function spawnUpgradeParticles() {
    const rect = treeContainer.getBoundingClientRect();
    const centerX = rect.left + rect.width / 2;
    const centerY = rect.top + rect.height / 2;

    for(let i = 0; i < 40; i++) {
      const particle = document.createElement('div');
      particle.className = 'particle bg-yellow-400';

      const size = Math.random() * 8 + 4;
      particle.style.width = `${size}px`;
      particle.style.height = `${size}px`;

      particle.style.left = `${centerX}px`;
      particle.style.top = `${centerY - 50}px`;

      const angle = Math.random() * Math.PI * 2;
      const distance = Math.random() * 150 + 50;
      particle.style.setProperty('--vx', `${Math.cos(angle) * distance}px`);
      particle.style.setProperty('--vy', `${Math.sin(angle) * distance}px`);

      const colors = ['#fbbf24', '#4ade80', '#60a5fa', '#f472b6', '#a78bfa', '#fb923c'];
      particle.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];

      document.body.appendChild(particle);
      setTimeout(() => particle.remove(), 1000);
    }
  }

  // 更新视觉状态 (核心渲染)
  function updateVisuals(isInit = false) {
    let state = pathState[currentPath];
    let stagesData = gameData[currentPath].stages;
    let newStageIndex = state.stageIndex;

    // UI 主题颜色切换
    const theme = gameData[currentPath].theme;
    document.getElementById('ui-title').className = `text-3xl font-black mb-2 drop-shadow-sm transition-colors ${theme.text}`;
    entityNameEl.className = `font-bold inline-block transition-colors ${theme.nameText}`;
    progressFill.className = `h-full rounded-full transition-all duration-300 ease-out bg-gradient-to-r ${theme.fill}`;

    // 计算当前属于哪个阶段
    for (let i = stagesData.length - 1; i >= 0; i--) {
      if (state.clicks >= stagesData[i].clicks) {
        newStageIndex = i;
        break;
      }
    }

    // 阶段提升或切路径时更新 SVG
    if (newStageIndex !== state.stageIndex || isInit) {
      state.stageIndex = newStageIndex;
      treeContainer.innerHTML = stagesData[state.stageIndex].svg;
      applyStagePresentation(state.stageIndex);
      entityNameEl.innerText = i18n[currentLang].stages[currentPath][state.stageIndex];

      if(!isInit) {
        entityNameEl.classList.remove('pop-text');
        void entityNameEl.offsetWidth; // 触发重绘
        entityNameEl.classList.add('pop-text');
        spawnUpgradeParticles();
      }
    } else {
      // 如果只是普通点击，确保名字是对的
      entityNameEl.innerText = i18n[currentLang].stages[currentPath][state.stageIndex];
    }

    // 更新计数器和进度条
    clickCountEl.innerText = state.clicks;

    let currentLevelClicks = stagesData[state.stageIndex].clicks;
    let nextLevelClicks = stagesData[state.stageIndex + 1] ? stagesData[state.stageIndex + 1].clicks : currentLevelClicks;

    if (state.stageIndex === stagesData.length - 1) {
      progressFill.style.width = '100%';
      nextGoalEl.innerText = i18n[currentLang].goalReached;
      nextGoalEl.className = `text-sm font-bold ${theme.text}`;
    } else {
      let progress = ((state.clicks - currentLevelClicks) / (nextLevelClicks - currentLevelClicks)) * 100;
      progressFill.style.width = `${progress}%`;
      nextGoalEl.className = 'text-sm text-gray-500 font-medium';

      let nextStageName = i18n[currentLang].stages[currentPath][state.stageIndex + 1];
      let clicksLeft = nextLevelClicks - state.clicks;
      nextGoalEl.innerText = i18n[currentLang].goalRemaining(clicksLeft, nextStageName);
    }
  }

  // 显示浮动的 +1 文字
  function showFloatingText(x, y) {
    const text = document.createElement('div');
    text.className = 'floating-number';
    text.innerText = '+1';
    text.style.left = `${x - 15}px`;
    text.style.top = `${y - 30}px`;
    text.style.setProperty('--drift', `${(Math.random() - 0.5) * 60}px`);

    gameArea.appendChild(text);
    setTimeout(() => text.remove(), 800);
  }

  // 处理点击
  function handleAction(x, y) {
    pathState[currentPath].clicks++;

    clickCountEl.style.transform = 'scale(1.2)';
    setTimeout(() => clickCountEl.style.transform = 'scale(1)', 100);

    showFloatingText(x, y);
    updateVisuals();
  }

  // 绑定事件
  gameArea.addEventListener('mousedown', (e) => {
    if (e.button !== 0) return;
    // 只排除语言选择器和成长路径选择器，其他区域点击都计数
    if (e.target.closest('#lang-select') || e.target.closest('#path-select')) return;
    handleAction(e.clientX, e.clientY);
  });

  gameArea.addEventListener('touchstart', (e) => {
    // 只排除语言选择器和成长路径选择器
    if (e.target.closest('#lang-select') || e.target.closest('#path-select')) return;
    e.preventDefault();
    Array.from(e.changedTouches).forEach(touch => {
      handleAction(touch.clientX, touch.clientY);
    });
  }, { passive: false });

  document.addEventListener('contextmenu', event => event.preventDefault());

  // 反制措施
  document.addEventListener('keydown', function(e) {
    if (e.key === 'F12' || e.keyCode === 123) { e.preventDefault(); return false; }
    if ((e.ctrlKey || e.metaKey) && e.shiftKey && (e.key === 'I' || e.key === 'i')) { e.preventDefault(); return false; }
    if ((e.ctrlKey || e.metaKey) && e.shiftKey && (e.key === 'J' || e.key === 'j')) { e.preventDefault(); return false; }
    if ((e.ctrlKey || e.metaKey) && (e.key === 'U' || e.key === 'u')) { e.preventDefault(); return false; }
  });

  setInterval(function() {
    const before = new Date().getTime();
    (function(){}).constructor('debugger')();
    const after = new Date().getTime();
  }, 2000);

  init();
</script>
</body>
</html>
